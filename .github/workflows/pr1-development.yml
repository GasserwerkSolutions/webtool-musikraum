name: PR1 Development Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Remove public empty-state placeholder
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("src/website.ts")
          source = path.read_text()
          old = """<div class=\"card-grid\">${cards || '<p class=\"empty\" data-preview-no-action>Weitere Angaben folgen.</p>'}</div>"""
          new = """${cards ? `<div class=\"card-grid\">${cards}</div>` : ""}"""
          if old in source:
              path.write_text(source.replace(old, new))
          elif new not in source:
              raise SystemExit("Expected offer placeholder pattern not found")
          PY
      - name: Capture full check
        continue-on-error: true
        run: |
          set -o pipefail
          npm run check 2>&1 | tee check.log
      - name: Build browser assets
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Commit synchronized source and assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/website.ts assets
          if ! git diff --cached --quiet; then
            git commit -m "Apply PR1 renderer policies and build assets"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr1-development-${{ github.run_number }}
          path: |
            check.log
            build.log
            assets/
