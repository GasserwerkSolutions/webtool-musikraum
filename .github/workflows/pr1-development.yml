name: PR1 Development Build

on:
  push:
    branches:
      - feature/editor-registry-history-policies

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Capture build
        continue-on-error: true
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr1-development-${{ github.run_number }}
          path: |
            typecheck.log
            build.log
            assets/
