name: PR1 Development Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee typecheck.log
      - name: Build browser assets
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Commit synchronized assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if ! git diff --cached --quiet; then
            git commit -m "Build PR1 browser assets"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr1-development-${{ github.run_number }}
          path: |
            typecheck.log
            build.log
            assets/
