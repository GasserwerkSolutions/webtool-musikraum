name: Generate browser assets once

on:
  push:
    branches: [agent/harden-export-and-inputs]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    if: github.head_ref == 'agent/harden-export-and-inputs' || github.ref_name == 'agent/harden-export-and-inputs'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-export-and-inputs
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets
          if git diff --cached --quiet; then
            echo "Assets already current"
          else
            git commit -m "Build browser assets"
            git push origin HEAD:agent/harden-export-and-inputs
          fi
      - name: Capture failing check output
        run: |
          set +e
          npm run check > /tmp/check.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            tail -n 180 /tmp/check.log > ci-debug.txt
            git add ci-debug.txt
            git commit -m "Capture CI failure details" || true
            git push origin HEAD:agent/harden-export-and-inputs
          fi
          exit "$status"
