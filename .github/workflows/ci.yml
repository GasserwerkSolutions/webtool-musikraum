name: Builder CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build browser assets
        run: npm run build
      - name: Logic and DOM tests
        run: node --test $(find tests -name '*.test.mjs' ! -name 'e2e.test.mjs' -print)
      - name: Chromium acceptance
        run: node --test tests/e2e.test.mjs
      - name: Compiled assets are current
        run: git diff --exit-code -- assets
