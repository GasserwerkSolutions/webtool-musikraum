name: Builder CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build browser assets
        run: npm run build
      - name: Content overview tests
        run: node --test tests/content-overview.test.mjs
      - name: Target occurrence and nesting
        run: node --test --test-name-pattern="unique occurrences" tests/preview-targets.test.mjs
      - name: Static field target coverage
        run: node --test --test-name-pattern="every registered field" tests/preview-targets.test.mjs
      - name: Preview keyboard and export
        run: node --test --test-name-pattern="space activates" tests/preview-targets.test.mjs
      - name: Chromium acceptance
        run: node --test tests/e2e.test.mjs
      - name: Compiled assets are current
        run: git diff --exit-code -- assets
