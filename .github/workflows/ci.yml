name: Builder CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/preview-input-stability
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply preview stability integration
        run: |
          python3 - <<'PYTHON'
          from pathlib import Path
          workflow = Path('.github/workflows/preview-stability-fix.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          block = workflow[start:end]
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in block.splitlines())
          exec(compile(script, 'preview-stability-integrate.py', 'exec'))
          PYTHON
      - name: Typecheck and build
        run: |
          npm run typecheck
          npm run build
      - name: Commit integrated sources and assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests assets
          if ! git diff --cached --quiet; then
            git commit -m "Stabilize incremental preview input updates"
            git push origin HEAD:fix/preview-input-stability
          fi
      - name: Planner and runtime regressions
        run: node --test tests/preview-update-planner.test.mjs tests/preview-runtime.test.mjs
      - name: Target uniqueness and roles
        run: node --test --test-name-pattern="unique occurrences" tests/preview-targets.test.mjs
      - name: Visible field coverage
        run: node --test --test-name-pattern="visibly rendered field" tests/preview-targets.test.mjs
      - name: Target keyboard activation
        run: node --test --test-name-pattern="space activates" tests/preview-targets.test.mjs
      - name: Export instrumentation
        run: node --test --test-name-pattern="export stays free" tests/preview-targets.test.mjs
      - name: Text-list wrapper targets
        run: node --test --test-name-pattern="visible list wrappers" tests/preview-targets.test.mjs
      - name: Existing unit and DOM tests
        run: node --test $(find tests -maxdepth 1 -name '*.test.mjs' ! -name 'e2e.test.mjs' ! -name 'preview-update-planner.test.mjs' ! -name 'preview-runtime.test.mjs' ! -name 'preview-targets.test.mjs' -print | sort)
      - name: Chromium acceptance
        run: |
          set -o pipefail
          node --test tests/e2e.test.mjs 2>&1 | tee e2e.log
      - name: Upload Chromium diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-stability-e2e
          path: e2e.log
      - name: Compiled assets are current
        if: success()
        run: git diff --exit-code -- assets