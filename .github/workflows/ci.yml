name: Builder CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build browser assets
        run: npm run build
      - name: Overview deterministic model
        run: node --test --test-name-pattern="deterministic completeness" tests/content-overview.test.mjs
      - name: Overview completeness states
        run: node --test --test-name-pattern="required, optional and hidden" tests/content-overview.test.mjs
      - name: Overview stable dynamic targets
        run: node --test --test-name-pattern="dynamic targets remain stable" tests/content-overview.test.mjs
      - name: Preview target tests
        run: node --test tests/preview-targets.test.mjs
      - name: Existing unit and DOM tests
        run: node --test $(find tests -maxdepth 1 -name '*.test.mjs' ! -name 'e2e.test.mjs' ! -name 'content-overview.test.mjs' ! -name 'preview-targets.test.mjs' -print | sort)
      - name: Chromium acceptance
        run: node --test tests/e2e.test.mjs
      - name: Compiled assets are current
        run: git diff --exit-code -- assets
