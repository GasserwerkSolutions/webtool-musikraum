name: Builder CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/content-overview-direct-editing
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply PR4 integration
        run: |
          python3 - <<'PYTHON'
          from pathlib import Path
          workflow = Path('.github/workflows/pr4-development.yml').read_text()
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY", start)
          block = workflow[start:end]
          script = "\n".join(line[10:] if line.startswith("          ") else line for line in block.splitlines())
          exec(compile(script, 'pr4-integrate.py', 'exec'))
          PYTHON
      - name: Commit integrated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html layout-overrides.css src tests
          if ! git diff --cached --quiet; then
            git commit -m "Complete content overview and preview target coverage"
            git push origin HEAD:feature/content-overview-direct-editing
          fi
      - name: Typecheck
        run: npm run typecheck
      - name: Build browser assets
        run: npm run build
      - name: Commit synchronized assets
        run: |
          git add assets
          if ! git diff --cached --quiet; then
            git commit -m "Synchronize PR4 browser modules"
            git push origin HEAD:feature/content-overview-direct-editing
          fi
      - name: Content overview tests
        run: node --test tests/content-overview.test.mjs
      - name: Preview target tests
        run: node --test tests/preview-targets.test.mjs
      - name: Existing unit and DOM tests
        run: node --test $(find tests -maxdepth 1 -name '*.test.mjs' ! -name 'e2e.test.mjs' ! -name 'content-overview.test.mjs' ! -name 'preview-targets.test.mjs' -print | sort)
      - name: Chromium acceptance
        run: node --test tests/e2e.test.mjs
      - name: Compiled assets are current
        run: git diff --exit-code -- assets
