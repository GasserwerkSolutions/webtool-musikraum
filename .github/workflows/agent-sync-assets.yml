name: Agent Sync Assets

on:
  push:
    branches: [agent/editable-hero-notes]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/editable-hero-notes
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Separate footer address and email
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/website.ts')
          text = path.read_text()
          old = '<div>${addressParts(draft, options)}${email ? previewLink(draft.site.email, "site.email", mailtoHref, options) : ""}</div>'
          new = '<div class="footer-contact">${address ? `<span class="footer-address">${addressParts(draft, options)}</span>` : ""}${email ? `<span class="footer-email">${previewLink(draft.site.email, "site.email", mailtoHref, options)}</span>` : ""}</div>'
          text = text.replace(old, new)
          old_css = '.footer-grid a{display:block;color:#fff}'
          new_css = '.footer-grid a{display:block;color:#fff}.footer-contact{display:grid;gap:4px}.footer-address,.footer-email{display:block}'
          text = text.replace(old_css, new_css)
          path.write_text(text)
          PY
      - run: npm run typecheck
      - run: npm run build
      - name: Commit patched source and compiled assets
        run: |
          if git diff --quiet -- src/website.ts assets; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/website.ts assets
          git commit -m "Separate footer contact details"
          git push
