name: Agent Sync Assets

on:
  push:
    branches: [agent/editable-hero-notes]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/editable-hero-notes
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply source migrations
        run: |
          python3 - <<'PY'
          from pathlib import Path

          website = Path('src/website.ts')
          text = website.read_text()
          text = text.replace(
            '<div>${addressParts(draft, options)}${email ? previewLink(draft.site.email, "site.email", mailtoHref, options) : ""}</div>',
            '<div class="footer-contact">${address ? `<span class="footer-address">${addressParts(draft, options)}</span>` : ""}${email ? `<span class="footer-email">${previewLink(draft.site.email, "site.email", mailtoHref, options)}</span>` : ""}</div>',
          )
          text = text.replace(
            '.footer-grid a{display:block;color:#fff}',
            '.footer-grid a{display:block;color:#fff}.footer-contact{display:grid;gap:4px}.footer-address,.footer-email{display:block}',
          )
          website.write_text(text)

          domain_test = Path('tests/domain.test.mjs')
          text = domain_test.read_text()
          text = text.replace(
            '  assert.equal(draft.offers.length, 3);\n  assert.deepEqual(Object.keys(draft).sort(), ["copy", "createdAt", "draftId", "layout", "offers", "schemaVersion", "site", "theme", "updatedAt"]);',
            '  assert.equal(draft.heroPoints.length, 3);\n  assert.equal(draft.introPoints.length, 3);\n  assert.equal(draft.offers.length, 3);\n  assert.deepEqual(Object.keys(draft).sort(), ["copy", "createdAt", "draftId", "heroPoints", "introPoints", "layout", "offers", "schemaVersion", "site", "theme", "updatedAt"]);',
          )
          domain_test.write_text(text)
          PY
      - run: npm run typecheck
      - run: npm run build
      - name: Commit patched source and compiled assets
        run: |
          if git diff --quiet -- src/website.ts assets tests/domain.test.mjs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/website.ts assets tests/domain.test.mjs
          git commit -m "Sync editable copy migrations"
          git push
