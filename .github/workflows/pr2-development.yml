name: PR2 Development Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnostics:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply reorder UI and Chromium acceptance
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index = Path("index.html")
          source = index.read_text()
          old_text = '<div class="item-card__topline"><strong data-text-item-number>Punkt</strong><button class="icon-button" type="button" data-action="remove-text-item" aria-label="Punkt entfernen">×</button></div>'
          new_text = '<div class="item-card__topline"><strong data-text-item-number>Punkt</strong><div class="reorder-actions" role="group" aria-label="Reihenfolge ändern"><button class="icon-button icon-button--move" type="button" data-reorder-direction="up">↑</button><button class="reorder-handle" type="button" data-reorder-handle><span aria-hidden="true">⠿</span></button><button class="icon-button icon-button--move" type="button" data-reorder-direction="down">↓</button></div><button class="icon-button" type="button" data-action="remove-text-item" aria-label="Punkt entfernen">×</button></div>'
          old_offer = '<div class="item-card__topline"><strong data-offer-number>Klangmoment</strong><button class="icon-button" type="button" data-action="remove-offer" aria-label="Klangmoment entfernen">×</button></div>'
          new_offer = '<div class="item-card__topline"><strong data-offer-number>Klangmoment</strong><div class="reorder-actions" role="group" aria-label="Reihenfolge ändern"><button class="icon-button icon-button--move" type="button" data-reorder-direction="up">↑</button><button class="reorder-handle" type="button" data-reorder-handle><span aria-hidden="true">⠿</span></button><button class="icon-button icon-button--move" type="button" data-reorder-direction="down">↓</button></div><button class="icon-button" type="button" data-action="remove-offer" aria-label="Klangmoment entfernen">×</button></div>'
          if old_text in source: source = source.replace(old_text, new_text)
          if old_offer in source: source = source.replace(old_offer, new_offer)
          if new_text not in source or new_offer not in source: raise SystemExit("Reorder templates missing")
          index.write_text(source)

          styles = Path("styles.css")
          css = styles.read_text()
          css = css.replace('.button:focus-visible, .surface-nav__item:focus-visible, .preset-card:focus-visible, .viewport-switch__button:focus-visible, .icon-button:focus-visible {', '.button:focus-visible, .surface-nav__item:focus-visible, .preset-card:focus-visible, .viewport-switch__button:focus-visible, .icon-button:focus-visible, .reorder-handle:focus-visible {')
          marker = '.reorder-actions { display: flex; align-items: center; gap: 5px; }'
          if marker not in css:
            needle = '.icon-button:disabled { opacity: .3; cursor: default; }'
            addition = '''.icon-button:disabled { opacity: .3; cursor: default; }
.reorder-actions { display: flex; align-items: center; gap: 5px; }
.reorder-handle { width: 36px; height: 36px; display: grid; place-items: center; padding: 0; border: 1px dashed #bdb5ab; border-radius: 10px; background: rgba(255,255,255,.5); color: var(--muted); cursor: grab; touch-action: none; font-size: 18px; line-height: 1; }
.reorder-handle:hover { border-color: var(--accent); background: #f4faf7; color: var(--accent-dark); }
.reorder-handle:active, .reorder-handle.is-dragging-handle { cursor: grabbing; }
.reorder-handle:disabled { opacity: .3; cursor: default; }
.item-card.is-dragging, .structure-row.is-dragging { opacity: .62; transform: scale(.99); box-shadow: 0 14px 32px rgba(40,32,24,.14); }
.item-card.is-drop-target-before, .structure-row.is-drop-target-before { box-shadow: inset 0 3px 0 var(--accent), 0 8px 22px rgba(40,32,24,.05); }
.item-card.is-drop-target-after, .structure-row.is-drop-target-after { box-shadow: inset 0 -3px 0 var(--accent), 0 8px 22px rgba(40,32,24,.05); }'''
            if needle not in css: raise SystemExit("CSS insertion point missing")
            css = css.replace(needle, addition)
          styles.write_text(css)

          e2e = Path("tests/e2e.test.mjs")
          test_source = e2e.read_text()
          marker = 'const heroOrderBefore = await page.$$eval'
          if marker not in test_source:
            needle = '    preview = await waitForPreview(page);\n\n    await page.click(\'[data-viewport="desktop"]\');'
            block = '''    preview = await waitForPreview(page);

    const heroOrderBefore = await page.$$eval('#heroPointList [data-text-item-field]', (inputs) => inputs.map((input) => input.value));
    await page.click('#heroPointList [data-text-item-card]:nth-child(2) [data-reorder-direction="up"]');
    assert.equal(await page.$eval('#heroPointList [data-text-item-card]:first-child [data-text-item-field]', (input) => input.value), heroOrderBefore[1]);
    assert.equal(await page.evaluate(() => document.activeElement?.hasAttribute('data-reorder-handle')), true);
    assert.match(await page.$eval('#editorAnnouncer', (node) => node.textContent), /Position 1 von 6/);
    await page.focus('#heroPointList [data-text-item-card]:first-child [data-reorder-handle]'); await page.keyboard.down('Alt'); await page.keyboard.press('ArrowDown'); await page.keyboard.up('Alt');
    assert.equal(await page.$eval('#heroPointList [data-text-item-card]:first-child [data-text-item-field]', (input) => input.value), heroOrderBefore[0]);

    await page.click('[data-panel-target="services"]');
    const offerOrderBefore = await page.$$eval('#offerList [data-offer-field="title"]', (inputs) => inputs.map((input) => input.value));
    let dragHandle = await page.$('#offerList [data-offer-card]:nth-child(2) [data-reorder-handle]'); let dragBox = await dragHandle.boundingBox(); let firstOfferBox = await page.$eval('#offerList [data-offer-card]:first-child', (card) => { const rect = card.getBoundingClientRect(); return { x: rect.x, y: rect.y, width: rect.width, height: rect.height }; });
    await page.mouse.move(dragBox.x + dragBox.width / 2, dragBox.y + dragBox.height / 2); await page.mouse.down(); await page.mouse.move(firstOfferBox.x + firstOfferBox.width / 2, firstOfferBox.y + 5, { steps: 4 }); await page.keyboard.press('Escape'); await page.mouse.up();
    assert.deepEqual(await page.$$eval('#offerList [data-offer-field="title"]', (inputs) => inputs.map((input) => input.value)), offerOrderBefore);
    dragHandle = await page.$('#offerList [data-offer-card]:nth-child(2) [data-reorder-handle]'); dragBox = await dragHandle.boundingBox(); firstOfferBox = await page.$eval('#offerList [data-offer-card]:first-child', (card) => { const rect = card.getBoundingClientRect(); return { x: rect.x, y: rect.y, width: rect.width, height: rect.height }; });
    await page.mouse.move(dragBox.x + dragBox.width / 2, dragBox.y + dragBox.height / 2); await page.mouse.down(); await page.mouse.move(firstOfferBox.x + firstOfferBox.width / 2, firstOfferBox.y + 5, { steps: 4 }); await page.mouse.up();
    assert.equal(await page.$eval('#offerList [data-offer-card]:first-child [data-offer-field="title"]', (input) => input.value), offerOrderBefore[1]);
    assert.match(await page.$eval('[data-action="undo"]', (button) => button.getAttribute('aria-label') ?? ''), /Klangmoment .* verschoben/);
    await page.click('[data-action="undo"]'); assert.deepEqual(await page.$$eval('#offerList [data-offer-field="title"]', (inputs) => inputs.map((input) => input.value)), offerOrderBefore);

    await page.click('[data-panel-target="structure"]'); const sectionOrderBefore = await page.$$eval('#structureList [data-section-key]', (rows) => rows.map((row) => row.getAttribute('data-section-key')));
    await page.click('#structureList [data-section-key]:nth-child(2) [data-reorder-direction="up"]');
    assert.equal(await page.$eval('#structureList [data-section-key]:first-child', (row) => row.getAttribute('data-section-key')), sectionOrderBefore[1]);
    assert.match(await page.$eval('#editorAnnouncer', (node) => node.textContent), /Bereich .* Position 1 von 5/);

    await page.click('[data-viewport="desktop"]');'''
            if needle not in test_source: raise SystemExit("E2E insertion point missing")
            test_source = test_source.replace(needle, block)
          e2e.write_text(test_source)
          PY
      - name: Run full check
        run: npm run check
      - name: Synchronize browser assets
        run: npm run build
      - name: Commit synchronized implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css tests/e2e.test.mjs assets
          if ! git diff --cached --quiet; then
            git commit -m "Complete unified reordering UI and assets"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
