name: Preview Stability Fix

on:
  push:
    branches: [fix/preview-input-stability]

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/preview-input-stability
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply preview stability fixes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          planner = r'''import type { MusicraumDraft } from "./domain.js";
          import type { DraftMutation } from "./draft-mutations.js";
          import type { PreviewOperation, PreviewRegion, PreviewTarget, StaticEditableField } from "./preview-contract.js";
          import { renderPreviewRegions, type PreviewRenderOptions } from "./preview-renderer.js";

          export type PreviewUpdatePlan =
            | { kind: "full"; revision: number; reason: "draft-replace" | "layout" | "metadata" | "unsupported" }
            | { kind: "noop"; revision: number }
            | { kind: "patch"; revision: number; operations: readonly PreviewOperation[] };

          const REGION_ORDER: readonly PreviewRegion[] = ["header", "hero", "intro", "why", "offers", "story", "contact", "footer"];
          const TEXT_FIELDS: Partial<Record<StaticEditableField, PreviewRegion>> = {
            "copy.heroLabel": "hero",
            "copy.heroTitle": "hero",
            "copy.heroSubtitle": "hero",
            "copy.introLabel": "intro",
            "copy.introTitle": "intro",
            "copy.introQuote": "intro",
            "copy.introText": "intro",
            "copy.whyLabel": "why",
            "copy.whyTitle": "why",
            "copy.whyText": "why",
            "copy.offersLabel": "offers",
            "copy.offersTitle": "offers",
            "copy.offersIntro": "offers",
            "copy.storyLabel": "story",
            "copy.storyTitle": "story",
            "copy.storyText": "story",
            "copy.contactLabel": "contact",
            "copy.contactTitle": "contact",
            "copy.contactText": "contact",
          };
          const REGION_FIELDS: Partial<Record<StaticEditableField, readonly PreviewRegion[]>> = {
            "site.name": ["header", "contact", "footer"],
            "site.tagline": ["header", "footer"],
            "site.phone": ["contact"],
            "site.email": ["contact", "footer"],
            "site.address": ["contact", "footer"],
            "site.postalCode": ["contact", "footer"],
            "site.city": ["contact", "footer"],
            "site.instagram": ["contact"],
            "copy.heroPrimaryAction": ["hero"],
            "copy.heroSecondaryAction": ["hero"],
            "copy.navIntro": ["header"],
            "copy.navWhy": ["header"],
            "copy.navOffers": ["header"],
            "copy.navStory": ["header"],
            "copy.navContact": ["header"],
            "copy.contactEmailAction": ["contact"],
            "copy.contactPhoneAction": ["contact"],
            "copy.contactInstagramAction": ["contact"],
          };

          export function planPreviewUpdate(mutations: readonly DraftMutation[], draft: Readonly<MusicraumDraft>, renderOptions: PreviewRenderOptions): PreviewUpdatePlan {
            const revision = mutations.reduce((latest, mutation) => Math.max(latest, mutation.revision), renderOptions.revision);
            const regions = new Set<PreviewRegion>();
            const texts = new Map<string, Extract<PreviewOperation, { type: "patch-text" }>>();
            let patchTheme = false;

            for (const mutation of mutations) {
              const effect = mutation.effect;
              if (effect.type === "draft-replace") return { kind: "full", revision, reason: "draft-replace" };
              if (effect.type === "section-move" || effect.type === "section-visibility") return { kind: "full", revision, reason: "layout" };
              if (effect.type === "theme-set") {
                if (effect.changed.includes("preset")) return { kind: "full", revision, reason: "metadata" };
                patchTheme = true;
                continue;
              }
              if (effect.type === "field-set") {
                const regional = REGION_FIELDS[effect.field];
                if (regional) {
                  for (const region of regional) if (isRegionVisible(region, draft)) regions.add(region);
                  continue;
                }
                const textRegion = TEXT_FIELDS[effect.field];
                if (!textRegion) return { kind: "full", revision, reason: "unsupported" };
                if (!isRegionVisible(textRegion, draft)) continue;
                if (effect.previousPresence === "present" && effect.nextPresence === "present") {
                  addText(texts, { kind: "field", field: effect.field }, fieldValue(draft, effect.field));
                } else {
                  regions.add(textRegion);
                }
                continue;
              }
              if (effect.type === "text-item-set") {
                const region: PreviewRegion = effect.list === "heroPoints" ? "hero" : "intro";
                if (!isRegionVisible(region, draft)) continue;
                if (effect.previousPresence !== "present" || effect.nextPresence !== "present") { regions.add(region); continue; }
                const item = draft[effect.list].find((entry) => entry.id === effect.itemId);
                if (!item) return { kind: "full", revision, reason: "unsupported" };
                addText(texts, { kind: "text-item", list: effect.list, itemId: effect.itemId }, item.text);
                continue;
              }
              if (effect.type === "offer-field-set") {
                if (!isRegionVisible("offers", draft)) continue;
                if (effect.previousPresence !== "present" || effect.nextPresence !== "present") { regions.add("offers"); continue; }
                const offer = draft.offers.find((entry) => entry.id === effect.offerId);
                if (!offer) return { kind: "full", revision, reason: "unsupported" };
                addText(texts, { kind: "offer", offerId: effect.offerId, field: effect.field }, offer[effect.field]);
                continue;
              }
              if (effect.type === "collection-insert" || effect.type === "collection-remove" || effect.type === "collection-move") {
                const region = effect.collection === "heroPoints" ? "hero" : effect.collection === "introPoints" ? "intro" : "offers";
                if (isRegionVisible(region, draft)) regions.add(region);
                continue;
              }
              return { kind: "full", revision, reason: "unsupported" };
            }

            for (const [key, operation] of texts) {
              const region = regionForTarget(operation.target);
              if (region && regions.has(region)) texts.delete(key);
            }

            const operations: PreviewOperation[] = [];
            const orderedRegions = REGION_ORDER.filter((region) => regions.has(region));
            if (orderedRegions.length) {
              const rendered = renderPreviewRegions(orderedRegions, draft, { ...renderOptions, revision });
              for (const region of orderedRegions) {
                const html = rendered.get(region);
                if (!html) return { kind: "full", revision, reason: "unsupported" };
                operations.push({ type: "replace-region", region, html });
              }
            }
            if (patchTheme) operations.push({ type: "patch-theme", primary: draft.theme.primary, accent: draft.theme.accent });
            operations.push(...[...texts.values()].sort((left, right) => targetKey(left.target).localeCompare(targetKey(right.target))));
            return operations.length ? { kind: "patch", revision, operations } : { kind: "noop", revision };
          }

          function addText(targets: Map<string, Extract<PreviewOperation, { type: "patch-text" }>>, target: PreviewTarget, value: string): void {
            targets.set(targetKey(target), { type: "patch-text", target, value });
          }
          function targetKey(target: PreviewTarget): string { return JSON.stringify(target); }
          function regionForTarget(target: PreviewTarget): PreviewRegion | null {
            if (target.kind === "offer") return "offers";
            if (target.kind === "text-item") return target.list === "heroPoints" ? "hero" : "intro";
            if (target.kind === "field") return TEXT_FIELDS[target.field] ?? REGION_FIELDS[target.field]?.[0] ?? null;
            return null;
          }
          function isRegionVisible(region: PreviewRegion, draft: Readonly<MusicraumDraft>): boolean {
            if (region === "header" || region === "hero" || region === "footer") return true;
            return draft.layout.visibility[region];
          }
          function fieldValue(draft: Readonly<MusicraumDraft>, field: StaticEditableField): string {
            const [group, key] = field.split(".") as ["site" | "copy", string];
            return String((draft[group] as unknown as Record<string, string>)[key] ?? "");
          }
          '''
          Path('src/preview-update-planner.ts').write_text('\n'.join(line[10:] if line.startswith('          ') else line for line in planner.splitlines()) + '\n')

          runtime = Path('src/preview-runtime.ts')
          source = runtime.read_text()
          old = '''    if (plan.kind === "full") {
                this.startFullRender(1);
                return;
              }
              this.pendingMutations = this.pendingMutations.filter((mutation) => mutation.revision > plan.revision);'''
          new = '''    if (plan.kind === "full") {
                this.startFullRender(1);
                return;
              }
              if (plan.kind === "noop") {
                this.pendingMutations = this.pendingMutations.filter((mutation) => mutation.revision > plan.revision);
                this.appliedRevisionValue = plan.revision;
                if (this.desiredRevisionValue > this.appliedRevisionValue || this.pendingMutations.length) this.scheduleFlush(0);
                return;
              }
              this.pendingMutations = this.pendingMutations.filter((mutation) => mutation.revision > plan.revision);'''
          if old in source:
              runtime.write_text(source.replace(old, new, 1))
          elif new not in source:
              raise SystemExit('preview runtime insertion point missing')

          bridge = Path('src/preview-bridge.ts')
          source = bridge.read_text()
          replacements = [
            ("const c=${serialized};let currentRevision=c.revision;", "const c=${serialized};let currentRevision=c.revision;let applyingUpdate=false;"),
            ("const commit=(plan)=>{const textRollback=plan.texts.map(({element})=>({element,value:element.textContent}));", "const commit=(plan)=>{const viewport={x:scrollX,y:scrollY};const textRollback=plan.texts.map(({element})=>({element,value:element.textContent}));"),
            ("for(const replacement of plan.regions){const state=captureRegionState(replacement.region,replacement.current);replacement.current.replaceWith(replacement.next);regionRollback.push({old:replacement.current,next:replacement.next});restoreRegionState(replacement.region,replacement.next,state)}}catch(error)", "for(const replacement of plan.regions){const state=captureRegionState(replacement.region,replacement.current);replacement.current.replaceWith(replacement.next);regionRollback.push({old:replacement.current,next:replacement.next});restoreRegionState(replacement.region,replacement.next,state)}scrollTo(viewport.x,viewport.y)}catch(error)"),
            ("try{const plan=validate(request);commit(plan);currentRevision=request.revision;send('update-result',{requestId:request.requestId,success:true})}catch(error){", "try{const plan=validate(request);applyingUpdate=true;commit(plan);currentRevision=request.revision;send('update-result',{requestId:request.requestId,success:true});requestAnimationFrame(()=>{applyingUpdate=false;reportScroll()})}catch(error){applyingUpdate=false;"),
            ("addEventListener('scroll',()=>{if(!pendingScroll){pendingScroll=true;requestAnimationFrame(reportScroll)}},{passive:true});", "addEventListener('scroll',()=>{if(applyingUpdate)return;if(!pendingScroll){pendingScroll=true;requestAnimationFrame(reportScroll)}},{passive:true});"),
          ]
          for old, new in replacements:
              if old in source:
                  source = source.replace(old, new, 1)
              elif new not in source:
                  raise SystemExit(f'preview bridge replacement missing: {old[:40]}')
          bridge.write_text(source)

          website = Path('src/website.ts')
          source = website.read_text()
          old = 'function renderTextList(items: readonly MusicraumTextItem[], list: TextListKey, tag: "span" | "li", options: BuildOptions): string { return items.filter((item) => item.text.trim()).map((item) => `<${tag}>${editableTextItem(item.text, list, item.id, `${list}-${item.id}`, options)}</${tag}>`).join(""); }'
          new = '''function renderTextList(items: readonly MusicraumTextItem[], list: TextListKey, tag: "span" | "li", options: BuildOptions): string {
            return items.filter((item) => item.text.trim()).map((item) => {
              const value = escapeHtml(item.text);
              return options.preview
                ? `<${tag} class="preview-edit-trigger"${previewTargetAttr(options, { kind: "text-item", list, itemId: item.id }, `${list}-${item.id}`)}>${value}</${tag}>`
                : `<${tag}>${value}</${tag}>`;
            }).join("");
          }'''
          new = '\n'.join(line[10:] if line.startswith('          ') else line for line in new.splitlines())
          if old in source:
              source = source.replace(old, new, 1)
          elif new not in source:
              raise SystemExit('renderTextList replacement missing')
          old_helper = 'function editableTextItem(value: string, list: TextListKey, itemId: string, occurrence: string, options: BuildOptions): string { return options.preview ? `<span class="preview-edit-trigger"${previewTargetAttr(options, { kind: "text-item", list, itemId }, occurrence)}>${escapeHtml(value)}</span>` : escapeHtml(value); }\n'
          source = source.replace(old_helper, '')
          website.write_text(source)

          planner_test = Path('tests/preview-update-planner.test.mjs')
          source = planner_test.read_text()
          old = '''test("layout, metadata and preset changes require a complete render", () => withDom(() => {
            const draft = createDefaultDraft();
            assert.equal(planPreviewUpdate([mutation(2, { type: "section-move", section: "why", previousIndex: 1, nextIndex: 0 })], draft, { ...renderOptions, revision: 2 }).kind, "full");
            assert.equal(planPreviewUpdate([mutation(2, { type: "field-set", field: "site.name", previousPresence: "present", nextPresence: "present" })], draft, { ...renderOptions, revision: 2 }).kind, "full");
            assert.equal(planPreviewUpdate([mutation(2, { type: "theme-set", changed: ["preset", "primary", "accent"] })], draft, { ...renderOptions, revision: 2 }).kind, "full");
          }));'''
          new = '''test("normal fields stay incremental while layout and preset changes require a complete render", () => withDom(() => {
            const draft = createDefaultDraft();
            const sitePlan = planPreviewUpdate([mutation(2, { type: "field-set", field: "site.name", previousPresence: "present", nextPresence: "present" })], draft, { ...renderOptions, revision: 2 });
            assert.equal(sitePlan.kind, "patch");
            assert.deepEqual(sitePlan.operations.map((operation) => operation.type === "replace-region" ? operation.region : operation.type), ["header", "contact", "footer"]);
            const subtitlePlan = planPreviewUpdate([mutation(2, { type: "field-set", field: "copy.heroSubtitle", previousPresence: "present", nextPresence: "present" })], draft, { ...renderOptions, revision: 2 });
            assert.deepEqual(subtitlePlan, { kind: "patch", revision: 2, operations: [{ type: "patch-text", target: { kind: "field", field: "copy.heroSubtitle" }, value: draft.copy.heroSubtitle }] });
            draft.layout.visibility.contact = false;
            assert.deepEqual(planPreviewUpdate([mutation(3, { type: "field-set", field: "site.phone", previousPresence: "present", nextPresence: "present" })], draft, { ...renderOptions, revision: 3 }), { kind: "noop", revision: 3 });
            assert.equal(planPreviewUpdate([mutation(4, { type: "section-move", section: "why", previousIndex: 1, nextIndex: 0 })], draft, { ...renderOptions, revision: 4 }).kind, "full");
            assert.equal(planPreviewUpdate([mutation(5, { type: "theme-set", changed: ["preset", "primary", "accent"] })], draft, { ...renderOptions, revision: 5 }).kind, "full");
          }));'''
          old = '\n'.join(line[10:] if line.startswith('          ') else line for line in old.splitlines())
          new = '\n'.join(line[10:] if line.startswith('          ') else line for line in new.splitlines())
          if old in source:
              planner_test.write_text(source.replace(old, new, 1))
          elif new not in source:
              raise SystemExit('planner test replacement missing')

          runtime_test = Path('tests/preview-runtime.test.mjs')
          source = runtime_test.read_text()
          source = source.replace('function fixture() {\n  const dom', 'function fixture(initialDraft = createDefaultDraft()) {\n  const dom', 1)
          source = source.replace('const store = new BuilderStore(createDefaultDraft(), new MemoryDraftRepository(), 0);', 'const store = new BuilderStore(initialDraft, new MemoryDraftRepository(), 0);', 1)
          addition = '''

          test("hidden-field no-op advances the applied revision without rebuilding", async () => {
            const draft = createDefaultDraft(); draft.layout.visibility.contact = false;
            const { store, runtime, sent, srcdocs, ready, close } = fixture(draft); runtime.start(); ready();
            store.mutate((next) => { next.site.phone = "+41321234567"; }, { intent: { type: "set-field", field: "site.phone" }, history: { label: "Telefonnummer geändert" } });
            await wait(70); assert.equal(runtime.appliedRevision, 1); assert.equal(sent.length, 0); assert.equal(srcdocs.length, 1); close();
          });
          '''
          addition = '\n'.join(line[10:] if line.startswith('          ') else line for line in addition.splitlines())
          marker = 'test("layout effects bypass patches and perform a full render"'
          if addition.strip() not in source:
              source = source.replace(marker, addition + '\n' + marker, 1)
          runtime_test.write_text(source)

          target_test = Path('tests/preview-targets.test.mjs')
          source = target_test.read_text()
          addition = '''

          test("text-list editor targets are the visible list wrappers", () => {
            const html = buildWebsiteHtml(completeDraft(), { preview: true, previewInstanceId: "lists", parentOrigin: "*", previewRevision: 0, renderGeneration: 1 });
            const dom = new JSDOM(html);
            const heroItems = [...dom.window.document.querySelectorAll(".hero-notes > span")];
            const introItems = [...dom.window.document.querySelectorAll(".plain-list > li")];
            assert.ok(heroItems.length > 0); assert.ok(introItems.length > 0);
            assert.ok([...heroItems, ...introItems].every((element) => element.hasAttribute("data-preview-target")));
            assert.equal(dom.window.document.querySelector(".hero-notes > span > .preview-edit-trigger, .plain-list > li > .preview-edit-trigger"), null);
            dom.window.close();
          });
          '''
          addition = '\n'.join(line[10:] if line.startswith('          ') else line for line in addition.splitlines())
          if addition.strip() not in source:
              target_test.write_text(source + addition)

          e2e = Path('tests/e2e.test.mjs')
          source = e2e.read_text()
          marker = '    const previousLocation = preview.url(); const mail = await preview.$(\'a[href^="mailto:"]\'); if (mail) await mail.click(); assert.equal(preview.url(), previousLocation);\n'
          addition = '''

              await page.click('[data-viewport="desktop"]'); await page.evaluate(() => new Promise((resolve) => setTimeout(resolve, 450)));
              await preview.evaluate(() => scrollTo(0, document.querySelector('#geschichte')?.offsetTop ?? 700));
              const stableScroll = await preview.evaluate(() => scrollY); const stableSrcdoc = await page.$eval('#previewFrame', (frame) => frame.getAttribute('srcdoc'));
              await page.click('[data-panel-target="site"]');
              const stableName = `Musikraum ${Date.now()}`;
              await page.$eval('[data-bind="site.name"]', (input, value) => { input.value = value; input.dispatchEvent(new Event('input', { bubbles: true })); }, stableName);
              await preview.waitForFunction((value) => document.querySelector('.brand strong')?.textContent === value, {}, stableName);
              await page.evaluate(() => new Promise((resolve) => setTimeout(resolve, 120)));
              assert.equal(await page.$eval('#previewFrame', (frame) => frame.getAttribute('srcdoc')), stableSrcdoc);
              closeEnough(await preview.evaluate(() => scrollY), stableScroll, 1);
              assert.equal(await preview.$eval('.hero-notes > span', (item) => item.querySelector('.preview-edit-trigger')), null);
          '''
          addition = '\n'.join(line[10:] if line.startswith('          ') else line for line in addition.splitlines())
          if addition.strip() not in source:
              if marker not in source: raise SystemExit('e2e insertion marker missing')
              source = source.replace(marker, marker + addition + '\n', 1)
              e2e.write_text(source)
          PY
      - name: Build and verify
        run: |
          npm run typecheck
          npm run build
          npm run check
          git diff --exit-code -- assets
      - name: Commit fix and synchronized assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests assets
          if ! git diff --cached --quiet; then
            git commit -m "Stabilize incremental preview input updates"
            git push origin HEAD:fix/preview-input-stability
          fi